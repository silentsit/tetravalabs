name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Use npm from packageManager
        run: corepack enable

      - name: Install dependencies
        run: npm ci

      - name: Normalize catalog
        run: npm run catalog:normalize

      - name: Build storefront
        run: npm run build --workspace=@tetrava/storefront
        env:
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          NEXT_PUBLIC_MEDUSA_URL: http://localhost:9000

      - name: Build Medusa backend
        run: npm run build --workspace=@tetrava/medusa
        env:
          DISABLE_MEDUSA_ADMIN: "true"
          NODE_ENV: production

      - name: Verify root Vercel build path
        run: npm run build:vercel-root
        env:
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          NEXT_PUBLIC_MEDUSA_URL: http://localhost:9000
