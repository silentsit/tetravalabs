<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="#ffffff"/>

  <!-- Faint skeletal molecule watermark (light grey, low opacity) -->
  <g stroke="#e6e6e6" stroke-width="3" fill="none" opacity="0.9">
    <line x1="150" y1="420" x2="230" y2="370"/>
    <line x1="230" y1="370" x2="310" y2="420"/>
    <line x1="310" y1="420" x2="310" y2="500"/>
    <line x1="310" y1="500" x2="230" y2="550"/>
    <line x1="230" y1="550" x2="150" y2="500"/>
    <line x1="150" y1="500" x2="150" y2="420"/>
    <line x1="310" y1="420" x2="390" y2="370"/>
    <line x1="390" y1="370" x2="470" y2="420"/>
    <line x1="470" y1="420" x2="470" y2="500"/>
    <line x1="470" y1="500" x2="550" y2="550"/>
    <line x1="550" y1="550" x2="630" y2="500"/>
    <line x1="630" y1="500" x2="630" y2="420"/>
    <line x1="630" y1="420" x2="700" y2="380"/>
    <line x1="470" y1="420" x2="550" y2="380"/>
  </g>
  <g fill="#e6e6e6" opacity="0.9">
    <circle cx="150" cy="420" r="4"/>
    <circle cx="230" cy="370" r="4"/>
    <circle cx="310" cy="420" r="4"/>
    <circle cx="310" cy="500" r="4"/>
    <circle cx="230" cy="550" r="4"/>
    <circle cx="150" cy="500" r="4"/>
    <circle cx="390" cy="370" r="4"/>
    <circle cx="470" cy="420" r="4"/>
    <circle cx="470" cy="500" r="4"/>
    <circle cx="550" cy="550" r="4"/>
    <circle cx="630" cy="500" r="4"/>
    <circle cx="630" cy="420" r="4"/>
    <circle cx="700" cy="380" r="4"/>
    <circle cx="550" cy="380" r="4"/>
  </g>

  <!-- Top-left brand lockup -->
  <g transform="translate(48, 48)">
    <!-- Blue hexagon icon -->
    <polygon points="20,0 40,11.5 40,34.5 20,46 0,34.5 0,11.5"
             fill="none" stroke="#1352d6" stroke-width="4" stroke-linejoin="round"/>
    <circle cx="20" cy="23" r="4" fill="#1352d6"/>
    <text x="54" y="30" font-size="24" font-weight="700" fill="#111111" letter-spacing="0.5">TetravaLabs</text>
  </g>

  <!-- Center headline -->
  <text x="400" y="400" text-anchor="middle" font-size="88" font-weight="800" fill="#0a0a0a" letter-spacing="1">RETATRUTIDE</text>

  <!-- CAS line -->
  <text x="400" y="450" text-anchor="middle" font-size="24" font-weight="500" fill="#1a1a1a" letter-spacing="1">CAS: 2381089-83-2</text>

  <!-- Highlight line: dosage left, purity right -->
  <text x="220" y="510" text-anchor="middle" font-size="40" font-weight="800" fill="#0a0a0a">20mg</text>
  <text x="580" y="510" text-anchor="middle" font-size="40" font-weight="800" fill="#0a0a0a">Purity: &gt;99.9%</text>

  <!-- Bottom separator + notice -->
  <line x1="48" y1="700" x2="752" y2="700" stroke="#0a0a0a" stroke-width="2.5"/>
  <text x="400" y="748" text-anchor="middle" font-size="30" font-weight="800" fill="#0a0a0a" letter-spacing="2">FOR RESEARCH USE ONLY</text>
</svg>
