# Tetrava Labs — Render Blueprint
# Storefront: Vercel (apps/storefront). Commerce API: Medusa on Render.
# Search: storefront uses the built-in catalog fallback; no managed search service required.

envVarGroups:
  - name: tetrava-medusa-shared
    envVars:
      - key: NODE_ENV
        value: production
      - key: USE_REDIS
        value: "true"
      - key: ENABLE_MEDUSA_ADMIN
        value: "true"
      - key: ADMIN_CORS
        value: https://tetrava-medusa-i44n.onrender.com
      - key: ORDER_EMAIL_CRON_SECRET
        generateValue: true

services:
  - type: web
    name: tetrava-medusa
    runtime: node
    region: oregon
    plan: starter
    rootDir: .
    buildCommand: node scripts/render-build.mjs
    preDeployCommand: npm run db:migrate --workspace=@tetrava/medusa -- --execute-all-links && npm run db:lab-schema --workspace=@tetrava/medusa
    startCommand: npm run medusa:start
    healthCheckPath: /health
    envVars:
      - fromGroup: tetrava-medusa-shared
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: STORE_CORS
        sync: false
      - key: AUTH_CORS
        sync: false
      - key: CRYPTO_WEBHOOK_SECRET
        sync: false
      - key: CRYPTO_CHECKOUT_BASE_URL
        sync: false
      - key: BTCPAY_URL
        sync: false
      - key: BTCPAY_API_KEY
        sync: false
      - key: BTCPAY_STORE_ID
        sync: false
      - key: BTCPAY_WEBHOOK_SECRET
        sync: false
      - key: PAYMENTO_API_KEY
        sync: false
      - key: PAYMENTO_SECRET_KEY
        sync: false
      - key: PAYMENTO_SPEED
        sync: false
      - key: STOREFRONT_URL
        value: https://tetravalabs.com
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_PUBLIC_BASE_URL
        sync: false
      - key: TYPESENSE_PROTOCOL
        sync: false
      - key: TYPESENSE_HOST
        sync: false
      - key: TYPESENSE_PORT
        sync: false
      - key: TYPESENSE_API_KEY
        sync: false
      - key: TYPESENSE_COLLECTION
        value: products
      - key: TYPESENSE_SYNC_SECRET
        sync: false
      - key: MEDUSA_PUBLISHABLE_KEY
        sync: false

  - type: cron
    name: tetrava-order-emails
    runtime: node
    region: oregon
    schedule: "*/5 * * * *"
    buildCommand: echo "cron"
    startCommand: node scripts/process-order-emails.mjs
    envVars:
      - fromGroup: tetrava-medusa-shared
      - key: MEDUSA_PUBLIC_URL
        fromService:
          type: web
          name: tetrava-medusa
          property: hostport
