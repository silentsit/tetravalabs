# Tetrava Labs — Render Blueprint
# Storefront deploys on Vercel; this Blueprint covers the Medusa commerce API.
# External services: Neon Postgres, Upstash Redis, Cloudflare R2, Typesense (Render private service).

envVarGroups:
  - name: tetrava-medusa-shared
    envVars:
      - key: NODE_ENV
        value: production
      - key: USE_REDIS
        value: "true"
      - key: ENABLE_MEDUSA_ADMIN
        value: "true"
      - key: ADMIN_CORS
        value: https://tetrava-medusa.onrender.com

services:
  - type: web
    name: tetrava-medusa
    runtime: node
    region: oregon
    plan: starter
    rootDir: .
    buildCommand: node scripts/render-build.mjs
    preDeployCommand: npm run db:migrate --workspace=@tetrava/medusa -- --execute-all-links && npm run db:lab-schema --workspace=@tetrava/medusa && npm run typesense:index
    startCommand: npm run medusa:start
    healthCheckPath: /health
    envVars:
      - fromGroup: tetrava-medusa-shared
      - key: ENABLE_MEDUSA_ADMIN
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: STORE_CORS
        sync: false
      - key: AUTH_CORS
        sync: false
      - key: CRYPTO_WEBHOOK_SECRET
        sync: false
      - key: CRYPTO_CHECKOUT_BASE_URL
        sync: false
      - key: BTCPAY_URL
        sync: false
      - key: BTCPAY_API_KEY
        sync: false
      - key: BTCPAY_STORE_ID
        sync: false
      - key: BTCPAY_WEBHOOK_SECRET
        sync: false
      - key: PAYMENTO_API_KEY
        sync: false
      - key: PAYMENTO_SECRET_KEY
        sync: false
      - key: PAYMENTO_SPEED
        sync: false
      - key: STOREFRONT_URL
        value: https://tetravalabs.com
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_PUBLIC_BASE_URL
        sync: false
      - key: TYPESENSE_PROTOCOL
        value: http
      - key: TYPESENSE_HOST
        fromService:
          name: tetrava-typesense
          type: pserv
          property: host
      - key: TYPESENSE_PORT
        fromService:
          name: tetrava-typesense
          type: pserv
          property: port
      - key: TYPESENSE_API_KEY
        fromService:
          name: tetrava-typesense
          type: pserv
          envVarKey: TYPESENSE_API_KEY
      - key: TYPESENSE_COLLECTION
        value: products

  - type: pserv
    name: tetrava-typesense
    runtime: image
    region: oregon
    plan: starter
    image:
      url: docker.io/typesense/typesense:27.1
    dockerCommand: --data-dir /data --api-key=${TYPESENSE_API_KEY} --listen-port=10000 --enable-cors
    envVars:
      - key: PORT
        value: "10000"
      - key: TYPESENSE_DATA_DIR
        value: /data
      - key: TYPESENSE_API_KEY
        generateValue: true
    disk:
      name: typesense-data
      mountPath: /data
      sizeGB: 1
